<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Funded — Global Startup Funding Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#F6F5EF; --card:#FFFFFF; --ink:#1A2417; --ink-soft:#5A6657;
  --line:#E3E2D8; --green:#7AB317; --green-deep:#4F7A0B;
  --sage:#D9E9B4; --sage-soft:#EAF2D8; --amber:#D97E2B; --amber-soft:#F8E8D4;
  --mono:'IBM Plex Mono',monospace; --sans:'IBM Plex Sans',sans-serif;
  --disp:'Space Grotesk',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
@media (prefers-reduced-motion:reduce){html{scroll-behavior:auto}*{transition:none!important;animation:none!important}}
body{background:var(--paper);color:var(--ink);font-family:var(--sans);font-size:15px;line-height:1.5;-webkit-text-size-adjust:100%;text-size-adjust:100%}
a{color:inherit}
button{font:inherit;cursor:pointer;background:none;border:none;color:inherit}
:focus-visible{outline:2px solid var(--green-deep);outline-offset:2px;border-radius:4px}

/* ---------- header ---------- */
header{border-bottom:1px solid var(--line);background:var(--paper);position:sticky;top:0;z-index:20}
.hwrap{max-width:1240px;margin:0 auto;padding:14px 24px;display:flex;align-items:baseline;gap:18px;flex-wrap:wrap}
.wordmark{font-family:var(--disp);font-weight:700;font-size:22px;letter-spacing:-.5px}
.wordmark em{font-style:normal;color:var(--green-deep)}
.updated{font-family:var(--mono);font-size:11px;color:var(--ink-soft)}
.stats{margin-left:auto;display:flex;gap:22px;flex-wrap:wrap}
.stat{display:flex;flex-direction:column;align-items:flex-end}
.stat b{font-family:var(--mono);font-size:17px;font-weight:500}
.stat span{font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:var(--ink-soft)}

/* ---------- layout ---------- */
.layout{max-width:1240px;margin:0 auto;padding:26px 24px 80px;display:grid;grid-template-columns:300px 1fr;gap:34px}
@media(max-width:880px){.layout{grid-template-columns:1fr}}

/* ---------- category rank (signature) ---------- */
.catpanel h2{font-family:var(--disp);font-size:13px;text-transform:uppercase;letter-spacing:1.2px;color:var(--ink-soft);margin-bottom:14px}
.catlist{display:flex;flex-direction:column;gap:9px}
.catrow{display:grid;grid-template-columns:30px 1fr;align-items:center;gap:8px}
.catrow .num{font-family:var(--mono);font-size:11px;color:var(--ink-soft)}
.catpill{display:flex;align-items:center;justify-content:space-between;gap:8px;
  background:var(--sage);border-radius:11px;padding:9px 14px;min-width:46%;
  font-size:13.5px;font-weight:500;text-align:left;transition:transform .12s ease, background .12s ease;border:1.5px solid transparent}
.catpill:hover{transform:translateX(3px)}
.catpill .n{font-family:var(--mono);font-size:11px;color:var(--green-deep)}
.catrow.top .catpill{background:var(--green);color:#fff;font-weight:600}
.catrow.top .catpill .n{color:#F0FAD8}
.catpill[aria-pressed="true"]{border-color:var(--ink);background:var(--ink);color:#fff}
.catpill[aria-pressed="true"] .n{color:var(--sage)}
.catclear{margin-top:12px;font-size:12px;color:var(--ink-soft);text-decoration:underline;display:none}
.catclear.show{display:inline}
@media(max-width:880px){
  .catlist{flex-direction:row;overflow-x:auto;padding-bottom:8px;gap:8px}
  .catrow{grid-template-columns:1fr}.catrow .num{display:none}
  .catpill{min-width:max-content;width:auto!important}
}

/* ---------- tabs & filters ---------- */
.tabs{display:flex;gap:4px;border-bottom:1px solid var(--line);margin-bottom:18px;flex-wrap:wrap}
.tab{font-family:var(--disp);font-size:14px;font-weight:500;padding:9px 16px;border-radius:8px 8px 0 0;color:var(--ink-soft);border-bottom:2.5px solid transparent}
.tab[aria-selected="true"]{color:var(--ink);border-bottom-color:var(--green);font-weight:700}
.tab .n{font-family:var(--mono);font-size:11px;color:var(--green-deep);margin-left:5px}
.filters{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:20px}
.search{flex:1;min-width:180px;background:var(--card);border:1px solid var(--line);border-radius:9px;padding:9px 13px;font:inherit;font-size:14px}
select{background:var(--card);border:1px solid var(--line);border-radius:9px;padding:9px 11px;font:inherit;font-size:13px;color:var(--ink)}
.chip{border:1px solid var(--line);background:var(--card);border-radius:99px;padding:7px 14px;font-size:12.5px;font-weight:500}
.chip[aria-pressed="true"]{background:var(--ink);color:#fff;border-color:var(--ink)}

/* ---------- cards ---------- */
.count{font-family:var(--mono);font-size:12px;color:var(--ink-soft);margin-bottom:14px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(min(330px,100%),1fr));gap:16px}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px 18px 14px;display:flex;flex-direction:column;gap:10px;transition:border-color .12s ease, box-shadow .12s ease}
.card:hover{border-color:var(--green);box-shadow:0 3px 14px rgba(40,60,20,.07)}
.card .toprow{display:flex;align-items:flex-start;gap:10px}
.cname{font-family:var(--disp);font-size:17px;font-weight:700;letter-spacing:-.2px;flex:1}
.badge{font-family:var(--mono);font-size:10px;font-weight:500;letter-spacing:.5px;padding:3px 8px;border-radius:5px;white-space:nowrap}
.badge.ai{background:var(--green);color:#fff}
.badge.nonai{border:1px solid var(--line);color:var(--ink-soft)}
.badge.multi{background:var(--amber-soft);color:var(--amber);border:1px solid #EAC9A4}
.badge.research{background:#E4E0F5;color:#4A3FA0}
.money{font-family:var(--mono);font-size:14.5px;font-weight:500;color:var(--green-deep)}
.money .rnd{color:var(--ink-soft);font-size:12px}
.csum{font-size:13px;color:var(--ink-soft);line-height:1.45;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.meta{display:flex;gap:7px;flex-wrap:wrap;font-size:11.5px}
.tag{background:var(--sage-soft);border-radius:6px;padding:3px 9px;color:var(--green-deep);font-weight:500}
.tag.geo{background:#F0EFE6;color:var(--ink-soft)}
.cfoot{display:flex;justify-content:space-between;align-items:center;border-top:1px dashed var(--line);padding-top:9px;font-family:var(--mono);font-size:11px;color:var(--ink-soft)}
.cfoot a{color:var(--green-deep);text-decoration:none;font-weight:500}
.cfoot a:hover{text-decoration:underline}
.histtoggle{font-family:var(--mono);font-size:11px;color:var(--amber);text-decoration:underline dotted}
.hist{display:none;border-top:1px dashed var(--line);padding-top:8px;font-size:12px}
.hist.show{display:block}
.hist li{list-style:none;display:flex;justify-content:space-between;gap:8px;padding:3px 0;font-family:var(--mono);font-size:11px}
.empty{padding:60px 20px;text-align:center;color:var(--ink-soft);border:1.5px dashed var(--line);border-radius:14px}
.loaderr{padding:40px;background:var(--amber-soft);border-radius:14px;font-size:14px;line-height:1.7}
.loaderr code{font-family:var(--mono);background:#fff;padding:2px 6px;border-radius:4px}

/* ---------- mindset banner & insights ---------- */
.mindset{background:var(--sage-soft);border:1px solid var(--sage);border-radius:12px;padding:13px 16px;margin-bottom:16px;font-size:13px;line-height:1.55}
.mindset b{font-family:var(--disp)}
.mindset .src{display:block;margin-top:6px;font-family:var(--mono);font-size:10.5px;color:var(--ink-soft)}
.mindset .src a{color:var(--green-deep)}
.tag.aud{background:#EFEAF8;color:#4A3FA0}
.insights{display:none;flex-direction:column;gap:32px}
.insights h3{font-family:var(--disp);font-size:15px;margin-bottom:4px}
.insights .note{font-size:12.5px;color:var(--ink-soft);margin-bottom:12px;line-height:1.5}
.insights .note a{color:var(--green-deep)}
.vrow{display:grid;grid-template-columns:175px 1fr;gap:10px;align-items:center;margin-bottom:9px}
.vrow .lbl{font-size:12.5px;font-weight:500}
.vbars{display:flex;flex-direction:column;gap:3px}
.vbar{display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:10.5px;color:var(--ink-soft)}
.vbar i{display:block;height:9px;border-radius:4px;background:var(--green);min-width:2px;flex:none}
.vbar.funded i{background:var(--amber)}
.legend{display:flex;gap:16px;font-family:var(--mono);font-size:11px;color:var(--ink-soft);margin-bottom:10px}
.legend i{display:inline-block;width:10px;height:10px;border-radius:3px;vertical-align:-1px;margin-right:5px}
.regcards{display:grid;grid-template-columns:repeat(auto-fill,minmax(min(280px,100%),1fr));gap:14px}
.regcard{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px 15px;font-size:12.5px;line-height:1.5}
.regcard b{font-family:var(--disp);font-size:14px;display:block;margin-bottom:5px}
.regcard .kpis{font-family:var(--mono);font-size:11px;color:var(--green-deep);margin-bottom:6px}
.regcard p{color:var(--ink-soft)}
@media(max-width:560px){.vrow{grid-template-columns:1fr;gap:4px}}

/* ---------- phones ---------- */
@media(max-width:560px){
  header{position:static}
  .hwrap{padding:12px 16px;gap:8px}
  .wordmark{font-size:19px}
  .stats{margin-left:0;width:100%;justify-content:space-between;gap:10px}
  .stat{align-items:flex-start}
  .stat b{font-size:15px}
  .layout{padding:18px 16px 60px;gap:26px}
  .tabs{flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch}
  .tab{white-space:nowrap;padding:9px 12px}
  .search{min-width:100%}
  .search,select{font-size:16px}
  .card{padding:16px 14px 12px}
}
</style>
</head>
<body>

<header>
  <div class="hwrap">
    <div class="wordmark">FUNDED<em>/DAILY</em></div>
    <div class="updated" id="updated">loading…</div>
    <div class="stats">
      <div class="stat"><b id="s-today">–</b><span>deals today</span></div>
      <div class="stat"><b id="s-companies">–</b><span>companies tracked</span></div>
      <div class="stat"><b id="s-ai">–</b><span>AI share</span></div>
      <div class="stat"><b id="s-countries">–</b><span>countries</span></div>
    </div>
  </div>
</header>

<div class="layout">
  <aside class="catpanel">
    <h2>What problem they solve</h2>
    <div class="catlist" id="catlist"></div>
    <button class="catclear" id="catclear">clear category filter</button>
  </aside>

  <main>
    <div class="tabs" role="tablist" id="tabs">
      <button class="tab" role="tab" data-tab="today" aria-selected="true">Today <span class="n" id="n-today"></span></button>
      <button class="tab" role="tab" data-tab="all" aria-selected="false">All companies <span class="n" id="n-all"></span></button>
      <button class="tab" role="tab" data-tab="regular" aria-selected="false">Regularly funded <span class="n" id="n-regular"></span></button>
      <button class="tab" role="tab" data-tab="research" aria-selected="false">Research-based <span class="n" id="n-research"></span></button>
      <button class="tab" role="tab" data-tab="insights" aria-selected="false">Mindset insights</button>
    </div>

    <div class="filters">
      <input class="search" id="search" type="search" placeholder="Search company, sector, keyword…" aria-label="Search companies">
      <select id="f-country" aria-label="Filter by country"><option value="">All countries</option></select>
      <select id="f-sector" aria-label="Filter by sector"><option value="">All sectors</option></select>
      <select id="f-audience" aria-label="Filter by audience"><option value="">All audiences</option></select>
      <button class="chip" data-stage="new" aria-pressed="false">New (seed)</button>
      <button class="chip" data-stage="emerging" aria-pressed="false">Emerging (A–B)</button>
      <button class="chip" data-stage="established" aria-pressed="false">Established (C+)</button>
      <button class="chip" id="f-ai" aria-pressed="false">AI only</button>
    </div>

    <div class="mindset" id="mindset" style="display:none"></div>
    <div class="count" id="count"></div>
    <div class="grid" id="grid"></div>
    <div class="empty" id="empty" style="display:none">No companies match these filters. Loosen one and the list refills.</div>
    <div class="insights" id="insights" style="display:none"></div>
  </main>
</div>

<script>
const FLAGS = {"USA":"🇺🇸","UK":"🇬🇧","Canada":"🇨🇦","France":"🇫🇷","Germany":"🇩🇪",
"Netherlands":"🇳🇱","Spain":"🇪🇸","Italy":"🇮🇹","Sweden":"🇸🇪","Norway":"🇳🇴",
"Denmark":"🇩🇰","Finland":"🇫🇮","Switzerland":"🇨🇭","Austria":"🇦🇹","Ireland":"🇮🇪",
"Portugal":"🇵🇹","Belgium":"🇧🇪","Poland":"🇵🇱","Czechia":"🇨🇿","Hungary":"🇭🇺",
"Romania":"🇷🇴","Bulgaria":"🇧🇬","Greece":"🇬🇷","Estonia":"🇪🇪","Latvia":"🇱🇻",
"Lithuania":"🇱🇹","Croatia":"🇭🇷","Luxembourg":"🇱🇺","Ukraine":"🇺🇦","Turkey":"🇹🇷",
"India":"🇮🇳","Singapore":"🇸🇬","Indonesia":"🇮🇩","Japan":"🇯🇵","South Korea":"🇰🇷",
"China":"🇨🇳","Hong Kong":"🇭🇰","Taiwan":"🇹🇼","Philippines":"🇵🇭","Thailand":"🇹🇭",
"Vietnam":"🇻🇳","Malaysia":"🇲🇾","Pakistan":"🇵🇰","UAE":"🇦🇪","Saudi Arabia":"🇸🇦",
"Israel":"🇮🇱","Egypt":"🇪🇬","Nigeria":"🇳🇬","Kenya":"🇰🇪","South Africa":"🇿🇦",
"Australia":"🇦🇺","New Zealand":"🇳🇿","Brazil":"🇧🇷","Argentina":"🇦🇷","Chile":"🇨🇱",
"Colombia":"🇨🇴","Peru":"🇵🇪","Mexico":"🇲🇽","Unknown":"🌐"};

/* ---- Anthropic "What 81,000 People Want from AI" (80,508 interviews,
        159 countries, 70 languages) — the public-mindset reference layer ---- */
const STUDY_URL = "https://www.anthropic.com/features/81k-interviews";

// % of interviewees naming each vision as their hope for AI
const VISIONS = {"Professional excellence":18.8,"Personal transformation":13.7,
 "Life management":13.5,"Time freedom":11.1,"Financial independence":9.7,
 "Societal transformation":9.4,"Entrepreneurship":8.7,"Learning & growth":8.4,
 "Creative expression":5.6};

const CONCERNS = [["Unreliability / hallucinations",26.7],["Job displacement",22.3],
 ["Loss of human autonomy",21.9],["Cognitive atrophy",16.3],["Governance gaps",14.7],
 ["Misinformation",13.6],["Surveillance & privacy",13.1]];

// dashboard category → nearest study vision (the 9 vision categories map to themselves)
const CAT2VISION = {"Health & longevity":"Personal transformation",
 "Climate & sustainability":"Societal transformation","Security & trust":"Societal transformation",
 "Connection & community":"Personal transformation","Entertainment & play":"Time freedom",
 "Scientific discovery":"Learning & growth","Infrastructure & tools":"Professional excellence",
 "Mobility & logistics":"Professional excellence","Food & agriculture":"Societal transformation"};
Object.keys(VISIONS).forEach(v => CAT2VISION[v] = v);

// what the study says people hope & fear, per dashboard category
const MINDSET = {
 "Professional excellence":"The #1 hope in the study — 18.8% want AI to take routine work so they can do meaningful work. The shade: 22.3% fear job displacement and 26.7% still distrust AI reliability.",
 "Personal transformation":"13.7% hope for growth and emotional wellbeing. 16% found real emotional support in AI — but they were 3× likelier to also fear unhealthy dependence (12%).",
 "Life management":"13.5% want AI to manage life's complexity — the dominant framing in wealthier regions.",
 "Time freedom":"11.1% hope AI buys back their hours. About half reported real time gains, yet 18% hit 'illusory productivity' — working faster without resting more.",
 "Financial independence":"9.7% hope AI builds wealth. 28% saw economic gains — independent workers (50%) far more than institutional employees (14%).",
 "Societal transformation":"9.4% hope AI improves society at large; 14.7% worry nobody is governing it properly.",
 "Entrepreneurship":"8.7% see AI as the path to building their own venture — the strongest framing in developing regions, where AI means opportunity creation.",
 "Learning & growth":"8.4% put learning first, and 33% reported learning benefits — but 16.3% fear cognitive atrophy, a worry highest among students and educators.",
 "Creative expression":"5.6% hope AI unlocks creative work — the smallest but most personal of the nine visions.",
 "Health & longevity":"Maps to the wellbeing side of Personal transformation (13.7%). A healthcare worker in the study: 'the pressure of documentation has lifted… more time to explain things to family members.'",
 "Climate & sustainability":"Speaks to Societal transformation (9.4%) — AI as a lever on collective problems.",
 "Security & trust":"Builds for the worried: 13.1% fear surveillance & privacy erosion and 13.6% fear misinformation — concerns strongest in Western Europe.",
 "Connection & community":"Touches the study's emotional-support tension: 16% found solace in AI companionship, 12% fear unhealthy reliance.",
 "Entertainment & play":"The leisure side of Time freedom (11.1%) — what people say they'd do with reclaimed hours.",
 "Scientific discovery":"Adjacent to Learning & growth (8.4%) and the 'cognitive partnership' benefit 17.2% already experience.",
 "Infrastructure & tools":"The picks-and-shovels answer to the study's #1 concern — 26.7% cite unreliability and hallucinations.",
 "Mobility & logistics":"Productivity infrastructure — productivity gains are the study's most-cited realized benefit (32%).",
 "Food & agriculture":"Opportunity creation in the physical economy — the framing developing regions used most."};

const REGION_NOTES = {
 "North America":"Net-positive but guarded; wealthier regions frame AI as a way to manage life's complexity.",
 "Europe":"Western Europe stands out for surveillance & privacy concern; AI framed as managing complexity.",
 "Asia":"East Asia shows the highest cognitive-atrophy and loss-of-meaning concern; South Asia leans optimistic with less focus on abstract governance.",
 "Middle East":"Closer to the developing-region pattern: optimism, with AI framed as opportunity creation.",
 "Africa":"Among the most optimistic regions; AI framed as opportunity via entrepreneurship and education.",
 "Latin America":"Lower/middle-income optimism — AI as opportunity creation more than risk.",
 "Oceania":"Patterns similar to North America and Western Europe: positive overall, more cautious than developing regions.",
 "Global":"Across 159 countries, 67% expressed net-positive sentiment."};

const state = {tab:"today", category:null, country:"", sector:"", audience:"", stages:new Set(), ai:false, q:""};
let DB = null, latestDate = "";

const $ = id => document.getElementById(id);
const esc = s => (s||"").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));

async function load(){
  try{
    const r = await fetch("data/companies.json", {cache:"no-store"});
    if(!r.ok) throw new Error(r.status);
    DB = await r.json();
  }catch(e){
    $("grid").innerHTML = "";
    $("count").innerHTML = `<div class="loaderr"><b>Couldn't load data/companies.json.</b><br>
      If you opened this file directly, run a local server first:
      <code>python3 -m http.server</code> then visit <code>http://localhost:8000</code>.<br>
      On GitHub Pages this loads automatically after the first workflow run.</div>`;
    return;
  }
  const companies = Object.values(DB.companies);
  companies.forEach(c => c.events.sort((a,b)=> b.date.localeCompare(a.date)));
  latestDate = companies.reduce((m,c)=> c.last_seen > m ? c.last_seen : m, "");
  DB.list = companies.sort((a,b)=> b.last_seen.localeCompare(a.last_seen) || a.name.localeCompare(b.name));

  $("updated").textContent = "updated " + (DB.updated||"").slice(0,16).replace("T"," ") + " UTC · latest deals " + latestDate;
  buildHeader(); buildCategoryRank(); buildSelects(); render();
}

function buildHeader(){
  const L = DB.list;
  $("s-companies").textContent = L.length;
  $("s-today").textContent = L.filter(c=> c.last_seen === latestDate).length;
  $("s-ai").textContent = Math.round(100 * L.filter(c=>c.is_ai).length / Math.max(L.length,1)) + "%";
  $("s-countries").textContent = new Set(L.map(c=>c.country).filter(c=>c!=="Unknown")).size;
  $("n-today").textContent = L.filter(c=> c.last_seen === latestDate).length;
  $("n-all").textContent = L.length;
  $("n-regular").textContent = L.filter(c=> c.events.length > 1).length;
  $("n-research").textContent = L.filter(c=> c.research_based).length;
}

function buildCategoryRank(){
  const counts = {};
  DB.list.forEach(c => counts[c.category] = (counts[c.category]||0)+1);
  const ranked = Object.entries(counts).sort((a,b)=> b[1]-a[1]);
  const max = ranked.length ? ranked[0][1] : 1;
  $("catlist").innerHTML = ranked.map(([cat,n],i)=>{
    const w = 46 + 54 * (n/max);
    return `<div class="catrow${i===0?" top":""}">
      <span class="num">${String(i+1).padStart(2,"0")}.</span>
      <button class="catpill" data-cat="${esc(cat)}" aria-pressed="false" style="width:${w}%">
        <span>${esc(cat)}</span><span class="n">${n}</span>
      </button></div>`;
  }).join("");
  document.querySelectorAll(".catpill").forEach(b => b.addEventListener("click", ()=>{
    state.category = state.category === b.dataset.cat ? null : b.dataset.cat;
    document.querySelectorAll(".catpill").forEach(x => x.setAttribute("aria-pressed", x.dataset.cat===state.category));
    $("catclear").classList.toggle("show", !!state.category);
    render();
  }));
  $("catclear").addEventListener("click", ()=>{
    state.category = null;
    document.querySelectorAll(".catpill").forEach(x=>x.setAttribute("aria-pressed","false"));
    $("catclear").classList.remove("show"); render();
  });
}

function buildSelects(){
  const countries = [...new Set(DB.list.map(c=>c.country))].sort();
  $("f-country").innerHTML += countries.map(c=>`<option>${esc(c)}</option>`).join("");
  const sectors = [...new Set(DB.list.map(c=>c.sector))].sort();
  $("f-sector").innerHTML += sectors.map(s=>`<option>${esc(s)}</option>`).join("");
  const audiences = [...new Set(DB.list.map(c=>c.audience||"General / mixed"))].sort();
  $("f-audience").innerHTML += audiences.map(a=>`<option>${esc(a)}</option>`).join("");
}

function filtered(){
  return DB.list.filter(c=>{
    if(state.tab==="today"    && c.last_seen !== latestDate) return false;
    if(state.tab==="regular"  && c.events.length < 2) return false;
    if(state.tab==="research" && !c.research_based) return false;
    if(state.category && c.category !== state.category) return false;
    if(state.country  && c.country  !== state.country)  return false;
    if(state.sector   && c.sector   !== state.sector)   return false;
    if(state.audience && (c.audience||"General / mixed") !== state.audience) return false;
    if(state.stages.size && !state.stages.has(c.stage)) return false;
    if(state.ai && !c.is_ai) return false;
    if(state.q){
      const hay = (c.name+" "+c.summary+" "+c.sector+" "+c.category+" "+c.country+" "+(c.audience||"")).toLowerCase();
      if(!hay.includes(state.q)) return false;
    }
    return true;
  });
}

function card(c){
  const ev = c.events[0];
  const money = ev.amount ? `<span class="money">${esc(ev.amount)} ${ev.round?`<span class="rnd">· ${esc(ev.round)}</span>`:""}</span>` : (ev.round?`<span class="money rnd">${esc(ev.round)}</span>`:"");
  const badges = [
    c.is_ai ? '<span class="badge ai">AI</span>' : '<span class="badge nonai">NON-AI</span>',
    c.events.length>1 ? `<span class="badge multi">FUNDED ×${c.events.length}</span>` : "",
    c.research_based ? '<span class="badge research">RESEARCH</span>' : "",
  ].join("");
  const hist = c.events.length>1 ? `
    <button class="histtoggle" data-h>show funding history</button>
    <ul class="hist">${c.events.map(e=>`<li><span>${e.date}</span><span>${esc(e.amount||"–")} ${esc(e.round||"")}</span></li>`).join("")}</ul>` : "";
  const stage = c.stage!=="unspecified" ? `<span class="tag geo">${c.stage}</span>` : "";
  return `<article class="card">
    <div class="toprow"><h3 class="cname">${esc(c.name)}</h3><div>${badges}</div></div>
    ${money}
    <p class="csum">${esc(c.summary || ev.title)}</p>
    <div class="meta">
      <span class="tag geo">${FLAGS[c.country]||"🌐"} ${esc(c.country)}</span>
      <span class="tag">${esc(c.sector)}</span>
      <span class="tag">${esc(c.category)}</span>
      ${c.audience && c.audience!=="General / mixed" ? `<span class="tag aud">for: ${esc(c.audience)}</span>` : ""}
      ${stage}
    </div>
    ${hist}
    <div class="cfoot"><span>${ev.date} · ${esc(ev.source)}</span><a href="${esc(ev.link)}" target="_blank" rel="noopener">read story ↗</a></div>
  </article>`;
}

function mindsetBanner(){
  const bits = [];
  if(state.category && MINDSET[state.category])
    bits.push(`<b>${esc(state.category)} — what the public feels:</b> ${esc(MINDSET[state.category])}`);
  if(state.country){
    const cs = DB.list.filter(c=>c.country===state.country);
    if(cs.length){
      const ai = Math.round(100*cs.filter(c=>c.is_ai).length/cs.length);
      const cats = {}; cs.forEach(c=>cats[c.category]=(cats[c.category]||0)+1);
      const top = Object.entries(cats).sort((a,b)=>b[1]-a[1]).slice(0,3)
        .map(([k,n])=>`${k} (${n})`).join(", ");
      const region = cs[0].region;
      bits.push(`<b>${FLAGS[state.country]||"🌐"} ${esc(state.country)} — what it's building:</b> ` +
        `${cs.length} tracked compan${cs.length===1?"y":"ies"}, ${ai}% AI. Top problems: ${esc(top)}. ` +
        `Public mindset in ${esc(region)}: ${esc(REGION_NOTES[region]||REGION_NOTES.Global)}`);
    }
  }
  const el = $("mindset");
  if(bits.length){
    el.innerHTML = bits.join("<br><br>") +
      `<span class="src">mindset data: <a href="${STUDY_URL}" target="_blank" rel="noopener">Anthropic — What 81,000 People Want from AI</a></span>`;
    el.style.display = "block";
  } else el.style.display = "none";
}

function buildInsights(){
  const L = DB.list, total = Math.max(L.length, 1);
  const funded = {};
  L.forEach(c => { const v = CAT2VISION[c.category] || "Professional excellence";
                   funded[v] = (funded[v]||0) + 1; });
  const vis = Object.entries(VISIONS).sort((a,b)=> b[1]-a[1]);
  const maxPct = Math.max(...vis.map(([,p])=>p), ...vis.map(([v])=>100*(funded[v]||0)/total));
  const rows = vis.map(([v,p])=>{
    const f = 100*(funded[v]||0)/total;
    return `<div class="vrow"><span class="lbl">${esc(v)}</span><div class="vbars">
      <div class="vbar"><i style="width:${(p/maxPct*100).toFixed(1)}%"></i>${p}% of people hope for this</div>
      <div class="vbar funded"><i style="width:${(f/maxPct*100).toFixed(1)}%"></i>${f.toFixed(1)}% of funded companies build for it (${funded[v]||0})</div>
    </div></div>`;
  }).join("");
  const cmax = CONCERNS[0][1];
  const concerns = CONCERNS.map(([c,p])=>`<div class="vrow"><span class="lbl">${esc(c)}</span>
    <div class="vbar"><i style="width:${(p/cmax*100).toFixed(1)}%"></i>${p}%</div></div>`).join("");
  const regs = {};
  L.forEach(c => { (regs[c.region] = regs[c.region]||[]).push(c); });
  const regcards = Object.entries(regs).sort((a,b)=> b[1].length-a[1].length).map(([r,cs])=>{
    const ai = Math.round(100*cs.filter(c=>c.is_ai).length/cs.length);
    const cats = {}; cs.forEach(c=>cats[c.category]=(cats[c.category]||0)+1);
    const top = Object.entries(cats).sort((a,b)=>b[1]-a[1]).slice(0,2).map(([k])=>k).join(" · ");
    return `<div class="regcard"><b>${esc(r)}</b>
      <div class="kpis">${cs.length} companies · ${ai}% AI · ${esc(top)}</div>
      <p>${esc(REGION_NOTES[r]||REGION_NOTES.Global)}</p></div>`;
  }).join("");
  $("insights").innerHTML = `
    <div><h3>What people want from AI vs what gets funded</h3>
      <div class="note">The nine visions from <a href="${STUDY_URL}" target="_blank" rel="noopener">Anthropic's
      81,000-interview study</a> (80,508 people, 159 countries, 70 languages), against the share of
      companies in this dashboard building for each vision. 81% of interviewees said AI already advanced
      their vision; 67% are net-positive on AI overall.</div>
      <div class="legend"><span><i style="background:var(--green)"></i>share of interviewees</span>
      <span><i style="background:var(--amber)"></i>share of funded companies</span></div>
      ${rows}</div>
    <div><h3>What worries the public</h3>
      <div class="note">Interviewees raised 2.3 distinct concerns each, on average. Worth reading next to
      what's getting funded above — e.g. reliability is the #1 worry, and infrastructure/tooling startups
      are the market's answer to it.</div>${concerns}</div>
    <div><h3>Regional mindsets vs what each region is building</h3>
      <div class="note">Company data accumulates daily from this dashboard's feeds; mindset notes are the
      study's regional findings. Pick a country in the filter above for a country-level view.</div>
      <div class="regcards">${regcards}</div></div>`;
}

function render(){
  const ins = state.tab === "insights";
  document.querySelector(".filters").style.display = ins ? "none" : "flex";
  $("count").style.display = ins ? "none" : "block";
  $("grid").style.display = ins ? "none" : "grid";
  $("insights").style.display = ins ? "flex" : "none";
  if(ins){ $("empty").style.display="none"; $("mindset").style.display="none"; buildInsights(); return; }
  mindsetBanner();
  const rows = filtered();
  $("count").textContent = rows.length + (rows.length===1?" company":" companies") +
    (state.tab==="today" ? ` funded on ${latestDate}` : "");
  $("grid").innerHTML = rows.map(card).join("");
  $("empty").style.display = rows.length ? "none" : "block";
  document.querySelectorAll("[data-h]").forEach(b => b.addEventListener("click", ()=>{
    const ul = b.nextElementSibling; const open = ul.classList.toggle("show");
    b.textContent = open ? "hide funding history" : "show funding history";
  }));
}

$("tabs").addEventListener("click", e=>{
  const t = e.target.closest(".tab"); if(!t) return;
  state.tab = t.dataset.tab;
  document.querySelectorAll(".tab").forEach(x=>x.setAttribute("aria-selected", x===t));
  render();
});
$("search").addEventListener("input", e=>{ state.q = e.target.value.trim().toLowerCase(); render(); });
$("f-country").addEventListener("change", e=>{ state.country = e.target.value; render(); });
$("f-sector").addEventListener("change", e=>{ state.sector = e.target.value; render(); });
$("f-audience").addEventListener("change", e=>{ state.audience = e.target.value; render(); });
document.querySelectorAll(".chip[data-stage]").forEach(b=> b.addEventListener("click", ()=>{
  const s = b.dataset.stage;
  state.stages.has(s) ? state.stages.delete(s) : state.stages.add(s);
  b.setAttribute("aria-pressed", state.stages.has(s)); render();
}));
$("f-ai").addEventListener("click", ()=>{
  state.ai = !state.ai; $("f-ai").setAttribute("aria-pressed", state.ai); render();
});

load();
</script>
</body>
</html>
