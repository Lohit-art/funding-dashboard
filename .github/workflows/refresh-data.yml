name: Refresh Funding Data (daily)

on:
  schedule:
    - cron: "0 13 * * *"   # 13:00 UTC = 8:00 AM Central
  workflow_dispatch: {}     # manual "Run workflow" button

permissions:
  contents: write           # allows committing data/companies.json back

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch and merge funding data
        env:
          LOOKBACK_HOURS: "26"
        run: python fetch_data.py

      - name: Commit updated dataset
        run: |
          git config user.name "funding-bot"
          git config user.email "actions@github.com"
          git add data/companies.json
          git diff --cached --quiet || git commit -m "data: daily refresh $(date -u +%F)"
          git push
